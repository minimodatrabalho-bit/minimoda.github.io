<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Área Administrativa | Mini Moda</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body class="login-page">

<div class="login-box">

    <img src="img/banner.png" alt="Mini Moda" class="login-logo">

    <h2>Área Administrativa</h2>

    <p>Digite a senha para acessar o painel.</p>

    <form action="painel-admin.html">

        <input type="password"
               placeholder="Senha do administrador"
               required>

        <button type="submit">
            Entrar
        </button>

    </form>

    <a href="login.html" class="voltar">
        ← Voltar
    </a>

</div>

</body>
</html>
