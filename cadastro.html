<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro | Mini Moda</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<section class="login">

    <div class="login-box">

        <img src="img/banner.png" alt="Mini Moda">

        <h1>Criar Conta</h1>

        <p>
            Preencha os dados para criar sua conta.
        </p>

        <form id="formCadastro">

            <input
            type="text"
            id="nome"
            placeholder="Nome Completo"
            required>

            <input
            type="email"
            id="email"
            placeholder="E-mail"
            required>

            <input
            type="text"
            id="telefone"
            placeholder="Telefone"
            required>

            <input
            type="password"
            id="senha"
            placeholder="Senha"
            required>

            <input
            type="password"
            id="confirmarSenha"
            placeholder="Confirmar Senha"
            required>

            <button type="submit" class="btn-login">
                Cadastrar
            </button>

        </form>

        <p style="margin-top:20px;">
            Já possui uma conta?
            <a href="cliente-login.html">Entrar</a>
        </p>

    </div>

</section>

<script src="js/cadastro.js"></script>

</body>

</html>
