<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo | Mini Moda</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f5f7fb;
}

.painel{

    display:flex;
    min-height:100vh;

}

.menu{

    width:260px;
    background:#5576d8;
    color:white;
    padding:30px;

}

.menu img{

    width:120px;
    display:block;
    margin:auto;

}

.menu h2{

    text-align:center;
    margin:20px 0 40px;

}

.menu a{

    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    transition:.3s;

}

.menu a:hover{

    background:white;
    color:#5576d8;

}

.conteudo{

    flex:1;
    padding:40px;

}

.cards{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;

}

.card{

    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.card i{

    font-size:35px;
    color:#ff5ea8;

}

.card h3{

    margin:15px 0 10px;

}

.card p{

    color:#666;

}

</style>

</head>

<body>

<div class="painel">

<div class="menu">

<img src="img/banner.png">

<h2>Mini Moda</h2>

<a href="#"><i class="fa-solid fa-house"></i> Dashboard</a>

<a href="#"><i class="fa-solid fa-shirt"></i> Produtos</a>

<a href="#"><i class="fa-solid fa-box"></i> Pedidos</a>

<a href="#"><i class="fa-solid fa-users"></i> Clientes</a>

<a href="#"><i class="fa-solid fa-chart-column"></i> Relatórios</a>

<a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>

</div>

<div class="conteudo">

<h1>Painel Administrativo</h1>

<p>Bem-vindo ao sistema da Mini Moda.</p>

<div class="cards">

<div class="card">

<i class="fa-solid fa-box"></i>

<h3>Pedidos</h3>

<p>32 pedidos realizados.</p>

</div>

<div class="card">

<i class="fa-solid fa-shirt"></i>

<h3>Produtos</h3>

<p>18 produtos cadastrados.</p>

</div>

<div class="card">

<i class="fa-solid fa-users"></i>

<h3>Clientes</h3>

<p>56 clientes cadastrados.</p>

</div>

<div class="card">

<i class="fa-solid fa-chart-line"></i>

<h3>Vendas</h3>

<p>R$ 8.540,00 este mês.</p>

</div>

</div>

</div>

</div>

</body>
</html>
