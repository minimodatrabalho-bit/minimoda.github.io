<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Mini Moda</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<section class="login">

    <div class="login-box">

        <img src="img/banner.png" alt="Mini Moda">

        <h1>Login do Cliente</h1>

        <p>
            Entre com seu e-mail e senha para acessar a Mini Moda.
        </p>

        <form>

            <input
            type="email"
            id="email"
            placeholder="Digite seu e-mail"
            required>

            <input
            type="password"
            id="senha"
            placeholder="Digite sua senha"
            required>

            <button type="submit" class="btn-login">
                Entrar
            </button>

        </form>

        <p style="margin-top:25px;">

            Não possui uma conta?

        </p>

        <a href="cadastro.html" class="btn-login">

            Criar Conta

        </a>

    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/cliente-login.js"></script>

</body>

</html>
