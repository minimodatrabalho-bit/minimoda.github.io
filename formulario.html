<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Solicitar Produto | Mini Moda</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">
        <img src="img/logo.png" alt="Mini Moda">
    </div>

    <nav>

        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="contato.html">Contato</a></li>
            <li><a href="formulario.html">Solicitar</a></li>
            <li><a href="pedidos.html">Pedidos</a></li>
        </ul>

    </nav>

</header>

<section class="banner">

    <div class="banner-texto">

        <h1>Solicitação de Produto</h1>

        <p>

            Preencha o formulário abaixo para solicitar um orçamento.

        </p>

    </div>

</section>

<section style="width:90%;max-width:800px;margin:60px auto;">

<form id="formPedido">

<label>Nome Completo</label>

<input
type="text"
id="nome"
placeholder="Digite seu nome"
required>

<br><br>

<label>E-mail</label>

<input
type="email"
id="email"
placeholder="Digite seu e-mail"
required>

<br><br>

<label>Telefone</label>

<input
type="text"
id="telefone"
placeholder="(00) 00000-0000"
required>

<br><br>

<label>Produto de Interesse</label>

<select id="produto">

<option>Vestido Infantil</option>
<option>Tênis Infantil</option>
<option>Conjunto Infantil</option>
<option>Body Bebê</option>
<option>Sandália Infantil</option>
<option>Jaqueta Infantil</option>

</select>

<br><br>

<label>Quantidade</label>

<input
type="number"
id="quantidade"
min="1"
required>

<br><br>

<label>Mensagem</label>

<textarea
id="mensagem"
rows="6"
placeholder="Escreva uma observação..."></textarea>

<br><br>

<button class="btn" type="submit">

Enviar Solicitação

</button>

</form>

</section>

<footer>

<p>

© 2025 Mini Moda - Todos os direitos reservados.

</p>

</footer>

<script src="js/formulario.js"></script>

</body>

</html>
